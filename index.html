<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Perfis AWS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="bg-white border-b border-slate-200 py-4 mb-8">
        <div class="max-w-5xl mx-auto px-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600">AWS Profile Manager</h1>
            <span class="text-xs font-mono text-slate-400 uppercase tracking-widest">Cloud Architecture Lab</span>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <!-- Formulário de Cadastro -->
            <div class="md:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-semibold mb-4">Novo Perfil</h2>
                    <form id="profileForm" class="space-y-4">
                        <div>
                            <label class="block text-xs font-medium text-slate-500 uppercase mb-1">Nome Completo</label>
                            <input type="text" name="nome" required class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 uppercase mb-1">Bio</label>
                            <textarea name="bio" rows="3" class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all"></textarea>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 uppercase mb-1">Foto de Perfil</label>
                            <input type="file" name="foto" accept="image/*" required class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 text-white font-semibold py-2 rounded-lg hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-200">
                            Cadastrar Perfil
                        </button>
                    </form>
                    <div id="status" class="mt-4 text-sm hidden"></div>
                </div>
            </div>

            <!-- Lista de Perfis -->
            <div class="md:col-span-2">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">Perfis Cadastrados</h2>
                    <button onclick="loadProfiles()" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">Atualizar Lista</button>
                </div>
                
                <div id="profileList" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- Perfis serão carregados aqui -->
                    <div class="animate-pulse bg-white p-4 rounded-xl border border-slate-200 h-32"></div>
                    <div class="animate-pulse bg-white p-4 rounded-xl border border-slate-200 h-32"></div>
                </div>
            </div>

        </div>
    </main>

    <script>
        const form = document.getElementById('profileForm');
        const statusDiv = document.getElementById('status');
        const profileList = document.getElementById('profileList');

        form.onsubmit = async (e) => {
            e.preventDefault();
            statusDiv.classList.remove('hidden');
            statusDiv.innerHTML = '<span class="text-slate-500">Enviando para AWS...</span>';
            
            const formData = new FormData(form);
            try {
                const response = await fetch('/api/perfis', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (response.ok) {
                    statusDiv.innerHTML = '<span class="text-emerald-600 font-medium">✓ Sucesso! Imagem em processamento.</span>';
                    form.reset();
                    setTimeout(loadProfiles, 2000); // Espera a Lambda processar
                } else {
                    statusDiv.innerHTML = `<span class="text-rose-600">Error: ${result.error}</span>`;
                }
            } catch (err) {
                statusDiv.innerHTML = '<span class="text-rose-600">Erro de conexão com o servidor.</span>';
            }
        };

        async function loadProfiles() {
            try {
                const response = await fetch('/api/perfis');
                const data = await response.json();
                
                profileList.innerHTML = '';
                if (data.length === 0) {
                    profileList.innerHTML = '<p class="text-slate-400 col-span-2 text-center py-8 italic">Nenhum perfil encontrado.</p>';
                    return;
                }

                data.forEach(perfil => {
                    const card = `
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex items-start gap-4 hover:shadow-md transition-shadow">
                            <img src="${perfil.foto_url}" alt="${perfil.nome}" 
                                 class="w-16 h-16 rounded-full object-cover bg-slate-100 border border-slate-100"
                                 onerror="this.src='https://ui-avatars.com/api/?name=${perfil.nome}&background=random'">
                            <div class="flex-1 min-w-0">
                                <h3 class="font-bold text-slate-900 truncate">${perfil.nome}</h3>
                                <p class="text-sm text-slate-500 line-clamp-2 mt-1">${perfil.bio || 'Sem bio.'}</p>
                            </div>
                        </div>
                    `;
                    profileList.innerHTML += card;
                });
            } catch (err) {
                console.error('Erro ao carregar perfis:', err);
            }
        }

        // Carga inicial
        loadProfiles();
    </script>
</body>
</html>
